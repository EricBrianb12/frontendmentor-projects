<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <title>Results summary Component</title>
  <link rel="stylesheet" href="styles/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>

<body>
  <article class="main-content">
    <section class="result-card">
      <h2>Your Result</h2>
      <div class="score-container">
        <p class="score">76</p>
        <p class="score-total">of 100</p>
      </div>
      <p class="result-status">Great</p>
      <p>You scored higher than 65% of the people who have taken these tests.</p>
    </section>

    <section class="summary-card">
      <h2>Summary</h2>
      <ul class="summary-list">
        <li class="summary-item reaction">
          <div class="summary-label">
            <img src="./assets/images/icon-reaction.svg" alt="">
            <span>Reaction</span>
          </div>
          <p class="summary-score">80</p>
        </li>

        <li class="summary-item memory">
          <div class="summary-label">
            <img src="./assets/images/icon-memory.svg" alt="">
            <span>Memory</span>
          </div>
          <p class="summary-score">92</p>
        </li>

        <li class="summary-item verbal">
          <div class="summary-label">
            <img src="./assets/images/icon-verbal.svg" alt="">
            <span>Verbal</span>
          </div>
          <p class="summary-score">61</p>
        </li>

        <li class="summary-item visual">
          <div class="summary-label">
            <img src="./assets/images/icon-visual.svg" alt="">
            <span>Visual</span>
          </div>
          <p class="summary-score">73</p>
        </li>
      </ul>
      <button type="button">Continue</button>
    </section>
  </article>
</body>

</html>
