<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NFT Preview Card | Frontendmentor challegend</title>
  <link rel="stylesheet" href="./dist/main.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
  <main class="main">
    <article class="card">
      <a class="card-image" href="#">
        <img src="./assets/images/image-equilibrium.jpg" alt="Image of a beautiful cube with a mirrored appearance.">
      </a>
      <h2 class="card-title"><a class="text01" href="#">Equilibrium #3429</a></h2>
      <p class="text02 blue-500 card-description">Our Equilibrium collection promotes balance and calm.</p>
      <div class="card-price">
        <span class="price text03 cyan-400"><img src="./assets/icons/icon-ethereum.svg" alt=""> 0.041 ETH</span>
        <span class="time-left text03-regular blue-500"><img src="./assets/icons/icon-clock.svg" alt="">3 days left</span>
      </div>
      <div class="card-creation">
        <img src="./assets/images/image-avatar.png" alt="Portrait of Jules Wyvern">
        <span class="text03-regular blue-500">Creation of <a href="#">Jules Wyvern</a></span>
      </div>
    </article>
  </main>
</body>

</html>
