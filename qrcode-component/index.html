<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <title>QR code component</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/global.css">
  <link rel="stylesheet" href="styles/card-style.css">
</head>

<body>
  <main>
    <article class="card">
      <figure>
        <a href="https://frontendmentor.io" target="_blank" rel="noopener noreferrer">
          <img class="card__image" src="assets/images/image-qr-code.png" alt="QR code linking to Frontend Mentor website">
        </a>

        <figcaption class="card__content">
          <h1 class="card__title">
            Improve your front-end skills by building projects
          </h1>
          <p class="card__paragraph">
            Scan the QR code to visit Frontend Mentor and take your coding skills to the next level
          </p>
        </figcaption>
      </figure>
    </article>
  </main>
</body>

</html>
