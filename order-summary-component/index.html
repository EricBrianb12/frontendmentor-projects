<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order summary component | Frontendmentor Challegends</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>

<body>
  <main>
    <article class="card">
      <div class="card-image">
        <img src="./assets/icons/illustration-hero.svg" alt="people listening to music on their cell phones">
      </div>

      <div class="card-content">
        <h2 class="card-title text01 blue-950">Order Summary</h2>
        <p class="card-description text03-medium gray-600">You can now listen to millions of songs, audiobooks, and podcasts on any device anywhere you like!</p>

        <div class="plan-details">
          <img src="./assets/icons/icon-music.svg" alt="Music icon">
          <div class="annual-plan">
            <h3 class="text03 blue-950">Annual Plan</h3>
            <span class="text03-medium gray-600">$59.99.year</span>
          </div>
          <button type="button" class="btn-change">Change</button>
        </div>

        <button type="button" class="btn-payment">Proceed to Payment</button>
        <button type="button" class="btn-cancel">Cancel order</button>
      </div>
    </article>
  </main>
</body>

</html>
