<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stats preview card component | Frontendmentor Challenges</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Lexend+Deca&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>

<body>
  <main>
    <article class="card white">
      <div class="card-content">
        <h1 class="text01">Get <span class="purple-500">insights</span> that help your business grow.</h1>
        <p class="text04 white-75">Discover the benefits of data analytics and make better decisions regarding revenue, customer experience, and overall efficiency.</p>

        <div class="card-stats">
          <div class="stat">
            <span class="stat-value text03">10k+</span>
            <span class="stat-label text05 white-60">Companies</span>
          </div>
          <div class="stat">
            <span class="stat-value text03">314</span>
            <span class="stat-label text05 white-60">Templates</span>
          </div>

          <div class="stat">
            <span class="stat-value text03">12M+</span>
            <span class="stat-label text05 white-60">Queries</span>
          </div>
        </div>
      </div>

      <div class="card-image">
        <img src="./assets/images/image-header-desktop-overlay-new.jpg" alt="">
      </div>
    </article>
  </main>
</body>

</html>
