<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <title>Social links</title>
  <link rel="stylesheet" href="styles/style.css">
</head>

<body>
  <main class="card">
    <img class="card_avatar" src="./assets/images/avatar-jessica.jpeg" alt="Image of a woman with curly hair, wearing a black shirt, looking at the camera.
">

    <div class="card_info">
      <h1 class="card_title">Jessica Randall</h1>
      <p class="card_location">London, United Kingdom</p>
    </div>

    <p class="card_bio">"Front-end developer and avid reader."</p>

    <nav class="card_nav" aria-label="social links">
      <ul class="card_list">
        <li><a href="#" rel="noopener noreferrer">Github</a></li>
        <li><a href="#" rel="noopener noreferrer">Frontend Mentor</a></li>
        <li><a href="#" rel="noopener noreferrer">LinkedIn</a></li>
        <li><a href="#" rel="noopener noreferrer">Twitter</a></li>
        <li><a href="#" rel="noopener noreferrer">Instagram</a></li>
      </ul>
    </nav>
  </main>
</body>

</html>
