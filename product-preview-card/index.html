<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <title>Product Preview Card</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/style.css">
</head>

<body>
  <main class="card">
    <picture class="card-image">
      <source srcset="./assets/img/image-product-mobile.jpg" media="(max-width: 600px)">
      <img src="./assets/img/image-product-desktop.jpg" alt="Image of a perfume bottle">
    </picture>

    <div class="card-info">
      <span class="text04 color-grey">PERFUME</span>
      <h1 class="text01 color-black">Gabrielle Essence Eau De Parfum</h1>
      <p class="text03 color-grey">A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator for the House of CHANEL.</p>
      <p class="text01 color-green-500 price">$149.99 <del class="text05 color-grey">$169.99</del></p>
      <button class="btn">
        <img src="./assets/icons/ShoppingCart.svg" alt="icon of a shopping cart">
        Add to cart
      </button>
    </div>
  </main>
</body>

</html>
