<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <title>Results summary Component</title>
  <link rel="stylesheet" href="styles/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>

<body>
  <article class="main-content">
    <section class="result-card">
      <h2 class="textPreset04 navy-200">Your Result</h2>

      <div class="score-container">
        <p class="score textPreset01 white">76</p>
        <p class="score-total textPreset05 navy-200">of 100</p>
      </div>

      <div class="result-status">
        <p class="textPreset03 white result-title">Great</p>
        <p class="textPreset05-m navy-200 result-description">You scored higher than 65% of the people who have taken these tests.</p>
      </div>
    </section>

    <section class="summary-card navy-950">
      <h2>Summary</h2>
      <ul class="summary-list">
        <li class="summary-item reaction">
          <div class="summary-label">
            <img src="./assets/images/icon-reaction.svg" alt="Icon Reaction">
            <span class="textPreset05-m red-400">Reaction</span>
          </div>
          <p class="summary-score textPreset05-b navy-950">80</p>
        </li>

        <li class="summary-item memory">
          <div class="summary-label">
            <img src="./assets/images/icon-memory.svg" alt="Icon Memory">
            <span class="textPreset05-m yellow-400">Memory</span>
          </div>
          <p class="summary-score textPreset05-b navy-950">92</p>
        </li>

        <li class="summary-item verbal">
          <div class="summary-label">
            <img src="./assets/images/icon-verbal.svg" alt="Icon Verbal">
            <span class="textPreset05-m green-500">Verbal</span>
          </div>
          <p class="summary-score textPreset05-b navy-950">61</p>
        </li>

        <li class="summary-item visual">
          <div class="summary-label">
            <img src="./assets/images/icon-visual.svg" alt="Icon visual">
            <span class="textPreset05-m blue-800">Visual</span>
          </div>
          <p class="summary-score textPreset05-b navy-950">73</p>
        </li>
      </ul>
      <button type="button" class="btn-primary textPreset05-b white">Continue</button>
    </section>
  </article>
</body>

</html>
