<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <title>Blog preview card</title>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/styles.css">
</head>

<body>
  <article class="card">
    <img src="assets/images/illustration-article.svg" alt="An abstract illustration of programming." class="card__thumb">

    <div class="card__content">
      <span class="card__category">Learning</span>
      <time datetime="2023-12-21" class="card__published">Published 21 Dec 2023</time>
      <h2 class="card__title">
        <a href="#">HTML & CSS foundations</a>
      </h2>
      <p class="card__description">These languages are the backbone of every website, defining structure, content, and presentation.</p>
    </div>

    <div class="card__author">
      <img src="assets/images/image-avatar.webp" alt="Greg Hooper's avatar">
      <span class="card__author-name">Greg Hooper</span>
    </div>
  </article>
</body>

</html>
